name: Deploy to AWS

# Gated to manual dispatch during development (Phase 1).
# Re-enable push trigger once AWS secrets are configured in repo Settings.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure these secrets in the GitHub repository settings before running this workflow.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_HOST }}
          key: ${{ secrets.AWS_SSH_KEY }}
          username: ${{ secrets.AWS_USER }}
          script: |
            cd /var/www/chateau-collective
            git pull origin main
            pip install -r requirements.txt
            sudo systemctl restart chateau-collective
